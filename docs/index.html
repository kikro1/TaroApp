<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title">Tarot - Онлайн расклады</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="page-glow" aria-hidden="true"></div>

  <main class="container">

    <section class="hero" aria-labelledby="mainTitle">
      <div class="settings-panel" aria-label="Настройки">

        <div class="language-switch">
          <label for="langSelect" data-i18n="langLabel">Язык:</label>
          <select id="langSelect">
            <option value="ru" selected>Русский</option>
            <option value="en">English</option>
          </select>
        </div>

        <div class="theme-switch">
          <span data-i18n="themeLabel">Тема:</span>
          <button id="themeToggle" class="ghost-button" type="button" aria-pressed="false">
            <span class="theme-icon" aria-hidden="true">☾</span>
            <span data-i18n="themeToggle">Сменить</span>
          </button>
        </div>

      </div>

      <p class="eyebrow" data-i18n="eyebrow">Интуитивный онлайн-расклад</p>
      <h1 id="mainTitle" data-i18n="mainTitle">Tarot — Онлайн расклад</h1>

      <p class="description" data-i18n="description">Введите данные и выберите расклад, чтобы получить толкование карт и ответ.</p>

      <div class="hero-deck" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </section>

    <!-- Форма пользователя -->
    <section class="panel user-fields" aria-labelledby="detailsTitle">
      <h2 id="detailsTitle" data-i18n="detailsTitle">Данные для расклада</h2>

      <label for="userName" data-i18n="nameLabel">Ваше имя</label>
      <input id="userName" type="text" data-i18n-placeholder="namePh" placeholder="Введите имя" />

      <label for="birthDate" data-i18n="birthLabel">Дата рождения</label>
      <input id="birthDate" type="date" />

      <label for="userQuestion" data-i18n="questionLabel">Ваш вопрос</label>
      <textarea id="userQuestion" data-i18n-placeholder="questionPh"
        placeholder="Например: Что ждёт меня в отношениях?"></textarea>

    </section>

    <!-- Кнопки раскладов -->
    <section class="panel spread-panel" aria-labelledby="spreadTitle">
      <h2 id="spreadTitle" data-i18n="chooseSpread">Выберите расклад</h2>

      <div class="buttons">
        <button type="button" data-spread="one" data-i18n="btnOne">1 карта</button>
        <button type="button" data-spread="three" data-i18n="btnThree">3 карты</button>
        <button type="button" data-spread="love" data-i18n="btnLove">Любовный расклад</button>
        <button type="button" data-spread="path" data-i18n="btnPath">Путь и совет</button>
        <button type="button" data-spread="celtic" data-i18n="btnCeltic">Кельтский крест</button>
        <button type="button" data-spread="yesno" data-i18n="btnYesNo">Да / Нет</button>
      </div>
    </section>

    <!-- Результат -->
    <section id="result" class="result" aria-live="polite"></section>

  </main>

  <script src="cards.js"></script>
  <script src="script.js"></script>

</body>
</html>
